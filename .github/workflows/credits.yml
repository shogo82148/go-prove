name: credits

on:
  push:
    paths:
      - "go.mod"
      - "go.sum"
      - ".github/workflows/credits.yml"
  workflow_dispatch:

jobs:
  credits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: install gocredits
        run: go install github.com/Songmu/gocredits/cmd/gocredits@latest

      - name: Run gocredits
        run: make credits
      - name: commit and create a pull request
        uses: shogo82148/actions-commit-and-create-pr@b1322fe9da4037e9720e34ea221997cffcd3498d # v1.1.4
        with:
          commit-message: Update CREDITS
          title: Update CREDITS
